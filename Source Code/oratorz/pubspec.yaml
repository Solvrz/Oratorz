name: oratorz
description: An All-In-One MUN Aid.

publish_to: "none"
version: 1.0.0+4

environment:
  sdk: ">=2.17.3 <3.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_web_plugins:
    sdk: flutter
  firebase_core: ^2.1.1
  firebase_auth: ^4.1.2
  cloud_firestore: ^4.0.3
  firebase_storage: ^11.0.3
  firebase_analytics: ^10.0.3
  flutter_localized_locales: ^2.0.3
  shared_preferences: ^2.0.15
  percent_indicator: ^4.2.2
  material_dialogs: ^1.1.3
  universal_html: ^2.0.8
  url_launcher: ^6.1.6
  google_fonts: ^3.0.1
  flutter_svg: ^1.1.6
  go_router: ^5.2.0
  intl: ^0.17.0
  http: ^0.13.5
  get: ^4.6.5

dev_dependencies:
  flutter_lints: ^2.0.1

  flutter_test:
    sdk: flutter

flutter:
  generate: true
  uses-material-design: true

  assets:
    - assets/
