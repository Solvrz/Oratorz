name: oratorz
description: An All-In-One MUN Aid.

publish_to: "none"
version: 1.0.0+4

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_web_plugins:
    sdk: flutter

  firebase_core: ^2.24.2
  firebase_analytics: ^10.8.0
  scrollable_positioned_list: ^0.3.8
  percent_indicator: ^4.2.3
  flutter_dropzone: ^3.0.6
  dropdown_search: ^5.0.6
  universal_html: ^2.2.4
  dotted_border: ^2.1.0
  url_launcher: ^6.2.3
  google_fonts: ^6.1.0
  flutter_svg: ^2.0.9
  get_storage: ^2.1.1
  file_picker: ^6.1.1
  collection: ^1.18.0
  go_router: ^13.0.1
  excel: ^4.0.2
  intl: ^0.18.1
  http: ^1.1.2
  get: ^4.6.6

dev_dependencies:
  flutter_lints: ^3.0.1

  flutter_test:
    sdk: flutter

flutter:
  generate: true
  uses-material-design: true

  assets:
    - assets/
