name: oratorz
description: An All-In-One MUN Aid.

publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_web_plugins:
    sdk: flutter
  firebase_core: ^3.13.1
  firebase_analytics: ^11.4.6
  scrollable_positioned_list: ^0.3.8
  percent_indicator: ^4.2.3
  dropdown_search: ^6.0.2
  universal_html: ^2.2.4
  dotted_border: ^3.0.1
  url_launcher: ^6.2.3
  google_fonts: ^6.1.0
  flutter_svg: ^2.0.9
  get_storage: ^2.1.1
  file_picker: ^10.1.9
  collection: ^1.18.0
  go_router: ^15.1.2
  excel: ^4.0.2
  http: ^1.2.0
  get: ^4.6.6
  firebase_auth: ^5.5.4

dev_dependencies:
  flutter_lints: ^5.0.0

  flutter_test:
    sdk: flutter

flutter:
  generate: true
  uses-material-design: true

  assets:
    - assets/
