  <script>
    const serviceWorkerVersion = null;

  <script src="flutter.js" defer></script>

  <style>
    .loading {
      height: 100vh;
      display: flex;
      align-items: center;
      flex-direction: column;
      justify-content: center;
    }

    .loader {
      position: relative;
    }

    .spinner {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      border-top: 8px solid #0d1520;
      border-right: 8px solid white;
      border-bottom: 8px solid #0d1520;
      border-left: 8px solid white;
      animation: spin 2s linear infinite;
      -webkit-animation: spin 2s linear infinite;
    }

    .center {
      top: 50%;
      left: 50%;
      height: 75px;
      width: 75px;
      position: absolute;
      transform: translate(-50%, -50%);
    }

    .name {
      margin-top: 25px;
    }

    @-webkit-keyframes spin {
      0% {
        -webkit-transform: rotate(0deg);
      }

      100% {
        -webkit-transform: rotate(360deg);
      }
    }

    @keyframes spin {
      0% {
        transform: rotate(0deg);
      }

      100% {
        transform: rotate(360deg);
      }
    }
  </style>
</head>

<body>
  <div class="loading">
    <div class="loader">
      <div class="spinner"></div>
      <img src="icons/android-chrome-512x512.png" class="center" />
    </div>
    <img src="name.png" class="name" />
  </div>

  <script type="module">

      storageBucket: "oratorz37.appspot.com",
      messagingSenderId: "349136834707",
      appId: "1:349136834707:web:3d6d0d62fca250d6cebd66",

  <script>
    window.addEventListener("load", function (ev) {

          engineInitializer.initializeEngine().then(function (appRunner) {
            appRunner.runApp();
